<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <style>
  /* 防止長按觸發複製/選取選單 */
  .stack, .stack *, .cell-btn, .cell-btn *,
  .overview-table, .overview-table * {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  :root {
    --bg: #07101d;
    --panel: #0f1728;
    --panel2: #131f36;
    --line: #2a3858;
    --text: #eef4ff;
    --muted: #90a1bd;
    --blue: #68a8ff;
    --good: #6de2a1;
    --bad: #ff7f7f;
    --red: #f04242;
    --yellow: #f7e35f;
    --green: #2ae25f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 20% -10%, rgba(49, 92, 164, .38), transparent 34%),
      radial-gradient(circle at 80% 0%, rgba(28, 60, 120, .28), transparent 32%),
      linear-gradient(180deg, #06101c 0%, #040913 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", sans-serif;
  }
  .app-shell { padding: 18px; }
  .app-panel {
    width: min(1720px, 100%);
    margin: 0 auto;
    border: 1px solid #23324f;
    background: linear-gradient(180deg, rgba(12, 20, 35, .95), rgba(6, 11, 21, .98));
    border-radius: 28px;
    padding: 24px;
    box-shadow: 0 24px 80px rgba(0, 0, 0, .38);
  }
  .hero, .modal-head, .topbar, .action-bar, .detail-header, .overview-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .hero { padding-bottom: 18px; border-bottom: 1px solid var(--line); }
  .eyebrow { color: var(--muted); font-size: 12px; letter-spacing: .16em; text-transform: uppercase; }
  h1 { margin: 4px 0 6px; font-size: 34px; }
  .hero p, .section-subtitle { margin: 0; color: var(--muted); }
  .hero-links { display: flex; flex-wrap: wrap; gap: 8px; }
  .hero-links a, .ghost-btn, .primary-btn {
    border-radius: 999px;
    padding: 10px 14px;
    border: 1px solid var(--line);
    background: #101b31;
    color: var(--text);
    text-decoration: none;
    cursor: pointer;
    font-size: 14px;
  }
  .primary-btn { border-color: #4f90f1; background: #245ec6; }
  .ghost-btn { background: #11192c; }
  .topbar { padding: 18px 0; align-items: stretch; }
  .status {
    flex: 1;
    min-height: 52px;
    padding: 14px 16px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: #10192d;
    font-weight: 700;
  }
  .status.ok { color: var(--good); border-color: rgba(109, 226, 161, .35); }
  .status.bad { color: var(--bad); border-color: rgba(255, 127, 127, .45); white-space: pre-wrap; }
  .search-dual { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; width: min(520px, 100%); }
  .search {
    width: 100%;
    height: 52px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: #111b31;
    color: var(--text);
    padding: 0 16px;
    font-size: 16px;
    outline: none;
  }
  .search:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(104, 168, 255, .14); }
  .section-title { font-size: 14px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
  .zone-chips, .search-results { display: flex; gap: 10px; overflow: auto; }
  .zone-chips { padding: 12px 0 18px; }
  .zone-chip {
    flex: 0 0 auto;
    border: 1px solid var(--line);
    background: #11192d;
    color: var(--text);
    border-radius: 18px;
    cursor: pointer;
    padding: 10px 14px;
  }
  .zone-chip.active { border-color: #49d17d; background: #173a2a; }
  .zone-chip.hit { border-color: rgba(73,209,125,.55); box-shadow: 0 0 0 1px rgba(73,209,125,.18), 0 0 18px rgba(73,209,125,.18); }
  .zone-chip.pulse, .cell-btn.pulse, .item-chip.pulse { animation: pulseGlow 1.6s ease-in-out infinite; }
  .zone-chip span { color: var(--muted); margin-left: 6px; }
  /* 同步狀態指示點 */
  .zone-sync-dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    margin-left: 4px;
    vertical-align: middle;
    font-style: normal;
  }
  .zone-sync-dot.syncing {
    background: #68a8ff;
    animation: zoneSyncPulse 0.9s ease-in-out infinite;
  }
  .zone-sync-dot.stale {
    background: rgba(255,200,80,.45);
  }
  @keyframes zoneSyncPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.25; }
  }
  .overview-panel, .detail-panel, .search-wrap {
    border: 1px solid var(--line);
    background: rgba(14, 22, 40, .84);
    border-radius: 22px;
    padding: 16px;
  }
  .overview-panel { margin-top: 4px; }
  .overview-head { align-items: flex-start; margin-bottom: 12px; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; color: var(--muted); }
  .overview-scroll {
    overflow: auto;
    border: 1px solid #263655;
    border-radius: 18px;
    background: #081120;
  }
  .overview-table {
    width: max-content;
    min-width: 100%;
    border-collapse: separate;
    border-spacing: 0;
  }
  .overview-table th,
  .overview-table td {
    border-right: 1px solid rgba(255,255,255,.06);
    border-bottom: 1px solid rgba(255,255,255,.06);
    vertical-align: top;
  }
  .overview-table thead th {
    position: sticky;
    top: 0;
    z-index: 3;
    background: #12203a;
    min-width: 122px;
    padding: 12px 10px;
    text-align: center;
  }
  .corner-cell {
    position: sticky;
    left: 0;
    z-index: 5;
    min-width: 98px;
    background: #13213e;
  }
  .slot-head strong { display:block; font-size: 28px; line-height: 1; }
  .slot-head small { display: block; color: var(--muted); margin-top: 4px; font-weight: 600; font-size: 11px; }
  .depth-head {
    position: sticky;
    left: 0;
    z-index: 2;
    min-width: 98px;
    background: #101a2f;
    padding: 10px 8px;
  }
  .depth-head strong { display: block; font-size: 15px; }
  .depth-head small { color: var(--muted); font-size: 11px; }
  .overview-cell {
    min-width: 168px;
    min-height: 175px;
    background: #0e1729;
    padding: 8px;
  }
  .cell-empty {
    min-height: 159px;
    border-radius: 12px;
    border: 1px dashed rgba(255,255,255,.07);
    background: rgba(255,255,255,.02);
  }
  .cell-btn {
    width: 100%;
    min-height: 159px;
    text-align: left;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.08);
    padding: 8px;
    cursor: pointer;
    color: #eaf1ff;
    background: linear-gradient(180deg, #1a2640, #10192d);
    box-shadow: 0 10px 22px rgba(0, 0, 0, .18);
  }
  .cell-btn.active { outline: 3px solid #49d17d; outline-offset: 2px; }
  .cell-btn.hit { box-shadow: 0 0 0 3px rgba(73, 209, 125, .28), 0 10px 22px rgba(0, 0, 0, .18); }
  .cell-lines {
    display: grid;
    gap: 4px;
  }
  .cell-line {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
    align-items: start;
    padding: 5px 6px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,.07);
    background: rgba(255,255,255,.03);
  }
  .cell-line.hit {
    border-color: #49d17d;
    box-shadow: inset 0 0 0 2px rgba(73, 209, 125, .28);
    background: rgba(73,209,125,.12);
  }
  .cell-main {
    min-width: 0;
    display: grid;
    gap: 2px;
  }
  .cell-sku {
    font-weight: 900;
    font-size: 14px;
    line-height: 1.05;
    word-break: break-word;
    color: #eef4ff;
  }
  .cell-batch-badge {
    flex: 0 0 auto;
    max-width: 72px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
    font-weight: 800;
    color: #7ff0a6;
    border: 1px solid rgba(73,209,125,.28);
    background: rgba(73,209,125,.08);
    border-radius: 999px;
    padding: 2px 6px;
  }
  .cell-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
    font-size: 10px;
    font-weight: 700;
    color: #9eb3d9;
  }
  .cf-loc { white-space: nowrap; }
  .cf-val { color: #fff; font-weight: 900; }
  .cf-lbl { color: #c9952a; font-weight: 800; }
  .detail-panel { margin-top: 16px; position: relative; }
  .cell-items { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 12px; }
  .item-chip { border: 1px solid var(--line); background: #11192d; color: var(--text); border-radius: 14px; padding: 12px; text-align: left; cursor: pointer; }
  .item-chip.active { border-color: #49d17d; box-shadow: 0 0 0 2px rgba(73,209,125,.18); }
  .item-chip-top, .item-chip-bottom { display:flex; justify-content:space-between; gap:8px; }
  .item-chip-top strong { font-size: 16px; }
  .item-chip-batch { color: var(--yellow); font-weight:800; }
  .item-chip-bottom { margin-top: 8px; color: var(--muted); font-size: 12px; font-weight:700; }
  .item-detail { margin-top: 12px; border: 1px solid #263655; border-radius: 18px; background: #0d172a; padding: 16px; }
  .item-detail.empty { color: var(--muted); display:grid; place-items:center; min-height: 120px; }
  .detail-grid { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 12px; }
  .detail-box { border:1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 10px 12px; background: rgba(255,255,255,.03); }
  .detail-box small { display:block; color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  .detail-box strong { display:block; font-size: 15px; word-break: break-word; }
  .detail-panel.hidden { display: none; }
  .cross-section {
    min-height: 420px;
    border-radius: 20px;
    border: 1px solid #263655;
    background:
      linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)),
      #0a1221;
    padding: 18px;
    overflow: auto;
    margin-top: 12px;
  }
  .cross-grid {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: minmax(132px, 1fr);
    gap: 14px;
    align-items: end;
    min-height: 360px;
  }
  .depth-col {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 10px;
    min-height: 340px;
  }
  .depth-col.selected .stack {
    border-color: rgba(104, 168, 255, .5);
    box-shadow: inset 0 0 0 2px rgba(104, 168, 255, .18);
  }
  .depth-col.selected .depth-col-head {
    color: #d7e7ff;
  }
  .depth-col-head {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 6px;
  }
  /* 容量徽章 */
  .depth-cap {
    display: inline-block;
    margin-left: 4px;
    padding: 1px 5px;
    border-radius: 8px;
    font-size: 11px;
    background: rgba(255,255,255,.1);
    color: var(--muted);
  }
  .depth-cap.cap-warn {
    background: rgba(255,200,50,.18);
    color: #ffc832;
  }
  .depth-cap.cap-full {
    background: rgba(240,66,66,.22);
    color: #ff8f8f;
  }
  /* 滿排：只顯示 badge 警告色，不擋點擊、不遮內容 */
  .depth-col.depth-full .depth-col-head {
    color: #ffc0a0;
  }
  .stack {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    justify-content: flex-end;
    border: 1px dashed rgba(255,255,255,.08);
    border-radius: 18px;
    padding: 14px 10px;
    background: rgba(18, 27, 46, .55);
  }
  .pallet {
    border-radius: 16px;
    padding: 10px 10px 9px;
    border: 2px solid rgba(255,255,255,.12);
    color: #04101f;
    cursor: pointer;
    box-shadow: 0 10px 22px rgba(0, 0, 0, .22);
  }
  .pallet.white { background: #f4f7fb; }
  .pallet.red { background: #ff4f4f; }
  .pallet.yellow { background: #ffe95d; }
  .pallet.green { background: #8ef5a8; }
  .pallet.bluefont { color: #0a3fb1; }
  .pallet.selected { outline: 3px solid #76aeff; outline-offset: 2px; }
  .pallet-sku { font-weight: 900; font-size: 11px; line-height: 1.15; overflow-wrap: break-word; word-break: normal; }
  .pallet-meta { display: flex; justify-content: space-between; gap: 4px; margin-top: 4px; font-size: 11px; font-weight: 800; flex-wrap: nowrap; }
  .floor { margin-top: 12px; text-align: center; color: var(--muted); font-size: 12px; }
  .cross-slot-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .06em;
    margin-bottom: 10px;
    padding: 4px 6px;
  }
  .cross-slot-banner strong {
    color: #fff;
    font-size: 15px;
    font-weight: 900;
    margin: 0 2px;
  }
  .banner-loc { flex: 1; }
  .banner-undo-redo { display: flex; gap: 6px; flex-shrink: 0; }
  .banner-undo-btn, .banner-redo-btn {
    background: #131f36;
    border: 1px solid #2a3858;
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
    cursor: pointer;
    transition: background .15s, border-color .15s, color .15s;
    white-space: nowrap;
  }
  .banner-undo-btn:not(.disabled):hover, .banner-redo-btn:not(.disabled):hover {
    background: #1a2f4a;
    border-color: #4a7aaa;
    color: #a8ccff;
  }
  .banner-undo-btn:not(.disabled), .banner-redo-btn:not(.disabled) {
    color: #a8ccff;
    border-color: #3a5878;
  }
  .banner-undo-btn.disabled, .banner-redo-btn.disabled {
    opacity: .3;
    cursor: default;
  }
  .banner-undo-btn .step-count, .banner-redo-btn .step-count,
  .undo-btn .step-count, .redo-btn .step-count {
    display: inline-block;
    margin-left: 4px;
    padding: 0 5px;
    border-radius: 8px;
    background: #2a3858;
    color: #a8ccff;
    font-size: 10px;
    font-weight: 800;
  }
  .banner-undo-btn.busy, .banner-redo-btn.busy,
  .undo-btn.busy, .redo-btn.busy {
    pointer-events: none;
    opacity: .85;
  }
  .banner-undo-btn.busy .btn-icon, .banner-redo-btn.busy .btn-icon,
  .undo-btn.busy .btn-icon, .redo-btn.busy .btn-icon {
    display: inline-block;
    animation: spin360 .7s linear infinite;
  }
  @keyframes spin360 {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .search-wrap { margin-bottom: 16px; }
  .search-wrap.hidden, .modal.hidden, .detail-backdrop.hidden { display: none; }
  .search-results { padding-top: 12px; }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 1px rgba(73,209,125,.12), 0 0 0 rgba(73,209,125,0); }
    50% { box-shadow: 0 0 0 1px rgba(73,209,125,.38), 0 0 24px rgba(73,209,125,.28); }
  }
  .search-card {
    flex: 0 0 auto;
    min-width: 190px;
    max-width: 220px;
    border: 2px solid var(--line);
    border-radius: 14px;
    background: #0f1828;
    padding: 10px 12px;
    cursor: pointer;
    color: var(--text);
    text-align: left;
  }
  .search-card.co-antiga { border-color: rgba(74,222,128,.65); }
  .search-card.co-xina   { border-color: rgba(96,165,250,.65); }
  .search-card.co-koya   { border-color: rgba(249,168,212,.65); }
  .search-card.co-hanhwa { border-color: rgba(250,204,21,.65); }
  .sc-top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .sc-sku { font-size: 17px; font-weight: 900; }
  .sc-batch { font-size: 11px; color: var(--yellow); font-weight: 800; }
  .sc-loc { font-size: 11px; color: var(--red); font-weight: 700; margin-top: 5px; }
  .sc-qty { display: flex; gap: 10px; margin-top: 6px; }
  .sc-box { font-size: 18px; font-weight: 900; color: #68c8ff; }
  .sc-piece { font-size: 18px; font-weight: 900; color: #7ff0a6; }
  .sc-box small, .sc-piece small { font-size: 11px; margin-left: 2px; opacity: .75; }
  .empty {
    display: grid;
    place-items: center;
    min-height: 220px;
    color: var(--muted);
    border: 1px dashed rgba(255,255,255,.1);
    border-radius: 18px;
  }
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(2, 6, 13, .72);
    display: grid;
    place-items: center;
    padding: 18px;
    z-index: 40;
  }
  .modal-card {
    width: min(620px, 100%);
    border-radius: 24px;
    border: 1px solid var(--line);
    background: #0c1425;
    padding: 20px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, .42);
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-top: 16px;
  }
  .form-grid label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
  .form-grid input, .form-grid select {
    height: 44px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: #111a2f;
    color: var(--text);
    padding: 0 12px;
    font-size: 15px;
  }
  .form-grid .wide { grid-column: 1 / -1; }
  .hint-box {
    margin-top: 16px;
    border: 1px solid #2d466f;
    background: #0d1b32;
    color: #b9d8ff;
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 13px;
  }
  /* 箱數/片數 並排大輸入框 */
  .qty-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .qty-label {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-size: 13px;
  }
  .qty-label input {
    height: 56px !important;
    font-size: 22px !important;
    font-weight: 900 !important;
    border-radius: 14px !important;
    text-align: center !important;
    padding: 0 12px !important;
  }
  .pz-hint {
    margin-left: 6px;
    font-size: 11px;
    font-weight: 800;
    color: #68c8ff;
    opacity: .85;
  }
  .action-bar { margin-top: 16px; justify-content: flex-end; }
  .detail-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(2, 6, 13, .4);
    z-index: 18;
  }
  /* item-summary 重新設計 */
  .item-summary { padding-bottom: 14px; border-bottom: 1px solid var(--line); margin-bottom: 4px; }
  .item-sum-row1 { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .item-sum-sku { font-size: 22px; font-weight: 900; color: var(--text); }
  .item-sum-batch { display: inline-flex; align-items: baseline; gap: 6px; font-size: 22px; font-weight: 900; color: var(--yellow); }
  .batch-label { font-size: 11px; font-weight: 800; color: var(--yellow); letter-spacing: .1em; opacity: .7; }
  .item-sum-qty { display: flex; align-items: flex-end; gap: 8px; margin-top: 10px; }
  .qty-box { font-size: 32px; font-weight: 900; color: #68c8ff; line-height: 1; }
  .qty-piece { font-size: 32px; font-weight: 900; color: #7ff0a6; line-height: 1; }
  .qty-box small, .qty-piece small { font-size: 14px; font-weight: 700; margin-left: 3px; opacity: .75; }
  .item-sum-loc { margin-top: 8px; font-size: 13px; font-weight: 800; color: var(--red); letter-spacing: .04em; }
  /* 倉位編碼樣式 */
  .item-sum-loc-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; flex-wrap: wrap; gap: 4px; }
  .loc-code { font-size: 14px; font-weight: 700; }
  .loc-val { color: #fff; font-size: 16px; font-weight: 900; }
  .loc-label { color: #c9952a; font-size: 12px; font-weight: 800; }
  .loc-sep { color: #c9952a; font-size: 13px; margin: 0 1px; }
  #slotTitle:empty { display: none; }
  .loc-pz { font-size: 12px; font-weight: 800; color: var(--muted); white-space: nowrap; }

  /* inline qty 輸入 */
  .qty-input {
    width: 72px;
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(255,255,255,.18);
    border-radius: 0;
    color: inherit;
    font-size: 32px;
    font-weight: 900;
    line-height: 1;
    padding: 0 2px 2px;
    outline: none;
    -moz-appearance: textfield;
    text-align: left;
  }
  .qty-input::-webkit-inner-spin-button,
  .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .qty-input:focus { border-bottom-color: var(--blue); }
  .qty-box-input { color: #68c8ff; }
  .qty-piece-input { color: #7ff0a6; }
  .qty-save-btn {
    margin-left: auto;
    align-self: center;
    background: #162e52;
    border: 1px solid #4f90f1;
    border-radius: 10px;
    padding: 6px 14px;
    color: #a8ccff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 800;
    white-space: nowrap;
  }
  .qty-save-btn:active { background: #245ec6; }

  /* 卡片 chip 箱裝數 */
  .chip-pz { font-size: 10px; color: var(--muted); font-weight: 600; }
  /* 數量狀態標籤 */
  .qty-status {
    display: inline-block;
    font-size: 10px;
    font-weight: 800;
    border-radius: 6px;
    padding: 1px 5px;
    margin-left: 4px;
    vertical-align: middle;
    white-space: nowrap;
  }
  .qty-status.reported { background: rgba(240,66,66,.18); color: #ff8f8f; }
  .qty-status.pending  { background: rgba(73,209,125,.18); color: #49d17d; }
  .qty-status.nosys    { background: rgba(247,227,95,.18); color: #f7e35f; }

  /* 原文名稱跨欄 */
  .detail-box-wide { grid-column: 1 / -1; }

  .detail-toggle {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: #11192d;
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
  }
  .detail-toggle:hover { border-color: var(--blue); color: var(--text); }
  .item-specs { margin-top: 12px; }
  .item-specs.hidden { display: none; }
  .item-img-wrap { text-align: center; margin-bottom: 14px; }
  .item-img { max-width: 100%; max-height: 220px; border-radius: 14px; border: 1px solid var(--line); object-fit: contain; }

  /* zoom controls */
  .zoom-controls { display: flex; gap: 6px; flex-shrink: 0; }
  .zoom-btn { padding: 8px 16px; font-size: 18px; font-weight: 900; min-width: 44px; }

  /* 倉庫定位地圖 */
  .warehouse-map-wrap {
    flex: 0 1 auto;
    border: 1px solid #1a2a42;
    border-radius: 10px;
    overflow: hidden;
    background: #080f1c;
  }
  .warehouse-map-wrap svg { display: block; }
  /* 在詳情面板裡的地圖 */
  .detail-map {
    flex: 1 1 auto;
    min-width: 140px;
    align-self: flex-start;
  }
  .detail-header {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 12px;
    padding-right: 36px;
  }
  .detail-header-left {
    flex: 0 0 auto;
    min-width: 0;
  }
  /* ✕ 關閉按鈕 釘在面板右上角 */
  .detail-close-x {
    position: absolute;
    top: 14px;
    right: 14px;
    background: #11192d;
    border: 1px solid #2a3858;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    z-index: 2;
  }
  .detail-close-x:active { background: #1e2e46; color: var(--text); }
  @media (max-width: 720px) {
    .detail-map { min-width: 120px; }
  }

  /* header */
  h1 { margin: 0; font-size: 22px; padding: 12px 0 4px; }
  .hero { padding-bottom: 10px; border-bottom: 1px solid var(--line); align-items: flex-start; }
  .ver-tag { font-size: 13px; font-weight: 600; color: var(--muted); vertical-align: middle; }
  .cache-row { display: flex; align-items: center; gap: 6px; }
  .operator-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .operator-label { font-size: 11px; font-weight: 700; color: var(--muted); white-space: nowrap; }
  .operator-input { background: #0d1929; border: 1px solid #1e2e44; border-radius: 6px; color: #e5eefb; font-size: 12px; padding: 3px 8px; width: 120px; outline: none; }
  .operator-input:focus { border-color: #49d17d; }
  .operator-input.warn { border-color: #ffb347; }
  .cache-info { font-size: 12px; font-weight: 700; color: var(--muted); }
  .cache-info.ok { color: var(--good); }
  .cache-info.loading { color: var(--blue); }
  .cache-info.bad { color: var(--bad); }
  .cache-info.settled { color: var(--muted); }
  .cache-refresh { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px; color: var(--muted); line-height: 1; }
  .undo-redo-wrap { display: flex; gap: 4px; }
  .undo-btn, .redo-btn {
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 8px;
    padding: 3px 10px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .undo-btn:not(.disabled):hover, .redo-btn:not(.disabled):hover {
    background: rgba(255,255,255,.14);
    color: #e8eaf0;
  }
  .undo-btn.disabled, .redo-btn.disabled {
    opacity: .3;
    cursor: default;
  }

  /* company glow on zone chips */
  @keyframes pulse-antiga { 0%,100%{box-shadow:0 0 0 1px rgba(74,222,128,.15),0 0 0 rgba(74,222,128,0)} 50%{box-shadow:0 0 0 2px rgba(74,222,128,.5),0 0 20px rgba(74,222,128,.3)} }
  @keyframes pulse-xina   { 0%,100%{box-shadow:0 0 0 1px rgba(96,165,250,.15),0 0 0 rgba(96,165,250,0)} 50%{box-shadow:0 0 0 2px rgba(96,165,250,.5),0 0 20px rgba(96,165,250,.3)} }
  @keyframes pulse-koya   { 0%,100%{box-shadow:0 0 0 1px rgba(249,168,212,.15),0 0 0 rgba(249,168,212,0)} 50%{box-shadow:0 0 0 2px rgba(249,168,212,.5),0 0 20px rgba(249,168,212,.3)} }
  @keyframes pulse-hanhwa { 0%,100%{box-shadow:0 0 0 1px rgba(250,204,21,.15),0 0 0 rgba(250,204,21,0)}  50%{box-shadow:0 0 0 2px rgba(250,204,21,.5),0 0 20px rgba(250,204,21,.3)} }
  .zone-chip.co-antiga.hit { border-color: rgba(74,222,128,.6); background: rgba(74,222,128,.08); animation: pulse-antiga 1.6s ease-in-out infinite; }
  .zone-chip.co-xina.hit   { border-color: rgba(96,165,250,.6); background: rgba(96,165,250,.08); animation: pulse-xina   1.6s ease-in-out infinite; }
  .zone-chip.co-koya.hit   { border-color: rgba(249,168,212,.6); background: rgba(249,168,212,.08); animation: pulse-koya  1.6s ease-in-out infinite; }
  .zone-chip.co-hanhwa.hit { border-color: rgba(250,204,21,.6); background: rgba(250,204,21,.08);  animation: pulse-hanhwa 1.6s ease-in-out infinite; }

  /* ===== 移動模式 ===== */
  @keyframes wiggle {
    0%,100% { transform: rotate(0deg) scale(1.03); }
    25%      { transform: rotate(-2.5deg) scale(1.03); }
    75%      { transform: rotate(2.5deg) scale(1.03); }
  }
  .pallet.wiggling {
    animation: wiggle 0.28s ease-in-out infinite;
    outline: 3px solid var(--yellow);
    outline-offset: 2px;
    cursor: grab;
    position: relative;
    z-index: 2;
  }
  .cross-grid.move-mode .pallet:not(.wiggling) { opacity: 0.38; }
  /* drop zone — 移動模式下常態可見 */
  .drop-zone {
    height: 28px;
    border-radius: 8px;
    margin: 3px 0;
    background: rgba(73,209,125,.08);
    border: 1.5px dashed rgba(73,209,125,.35);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: height .15s, background .15s, border-color .15s;
    cursor: pointer;
  }
  .drop-zone::after {
    content: '放這裡';
    color: rgba(73,209,125,.55);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .04em;
  }
  .drop-zone.active, .drop-zone:hover {
    height: 40px;
    background: rgba(73,209,125,.22);
    border-color: #49d17d;
    border-width: 2px;
  }
  .drop-zone.active::after, .drop-zone:hover::after {
    content: '✓ 放這裡';
    color: #49d17d;
    font-size: 12px;
  }
  /* ghost card 跟手指走 */
  .move-ghost {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    border-radius: 14px;
    padding: 9px 12px;
    border: 2px solid var(--yellow);
    background: #ffe95d;
    color: #04101f;
    box-shadow: 0 12px 36px rgba(0,0,0,.45);
    min-width: 110px;
    max-width: 160px;
    transform: rotate(3deg) scale(1.06);
    opacity: .92;
    font-size: 12px;
    font-weight: 900;
  }
  /* 移動 action bar（釘在 detail panel 底部） */
  .move-bar {
    position: sticky;
    bottom: 0;
    background: linear-gradient(0deg,#0a1321 80%,transparent);
    padding: 10px 14px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 5;
  }
  .move-bar-sku { flex:1; font-size:12px; font-weight:900; color:var(--yellow); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .move-bar-slot-btn { background:#162e52; border:1px solid #4f90f1; border-radius:10px; padding:7px 12px; color:#a8ccff; font-size:12px; font-weight:800; cursor:pointer; white-space:nowrap; }
  .move-bar-cancel    { background:#1a1f2e; border:1px solid #2a3858; border-radius:10px; padding:7px 12px; color:var(--muted); font-size:12px; font-weight:800; cursor:pointer; }
  /* 移動按鈕（itemDetail 內） */
  .item-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .move-start-btn {
    padding: 8px 16px;
    background: rgba(73,209,125,.15);
    border: 1.5px solid rgba(73,209,125,.55);
    border-radius: 12px;
    color: #49d17d;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .move-start-btn:hover, .move-start-btn:active {
    background: rgba(73,209,125,.28);
    border-color: #49d17d;
  }
  .moving-badge {
    font-size: 12px;
    font-weight: 700;
    color: #49d17d;
    padding: 6px 10px;
    background: rgba(73,209,125,.1);
    border-radius: 10px;
    border: 1px solid rgba(73,209,125,.3);
  }
  /* 選格子 overlay */
  .move-slot-overlay {
    position: fixed; inset:0; background:rgba(2,6,13,.72);
    display:flex; flex-direction:column; justify-content:flex-end;
    z-index: 35; padding:0;
  }
  .move-slot-overlay.hidden { display:none; }
  .move-slot-card {
    background:#0c1425; border-radius:24px 24px 0 0;
    border:1px solid var(--line); padding:20px;
    max-height:72vh; overflow:auto;
  }
  .move-zone-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #1e2e44; }
  .move-zone-chip { padding:5px 12px; border-radius:20px; border:1px solid #2a3f5a; background:#0d1929; color:#8aabb8; font-size:12px; font-weight:700; cursor:pointer; transition:border-color .15s,background .15s; }
  .move-zone-chip:active, .move-zone-chip.selected { border-color:#49d17d; background:#173a2a; color:#7ee787; }
  .move-slot-list { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
  .move-slot-chip {
    border:1px solid var(--line); background:#11192d;
    border-radius:14px; padding:10px 14px; cursor:pointer;
    color:var(--text); font-size:15px; font-weight:800;
    transition: border-color .15s, background .15s;
  }
  .move-slot-chip:active, .move-slot-chip.selected { border-color:#49d17d; background:#173a2a; }
  .move-slot-chip small { display:block; color:var(--muted); font-size:11px; font-weight:600; margin-top:2px; }
  .move-depth-picker { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; padding-top:14px; border-top:1px solid var(--line); }
  .move-depth-picker.hidden { display:none; }
  .move-depth-chip {
    border:1px solid var(--line); background:#11192d;
    border-radius:12px; padding:8px 14px; cursor:pointer;
    color:var(--text); font-size:13px; font-weight:800;
  }
  .move-depth-chip.selected { border-color:#4f90f1; background:#162e52; color:#a8ccff; }
  /* 確認 overlay */
  .move-confirm-overlay {
    position:fixed; inset:0; background:rgba(2,6,13,.72);
    display:grid; place-items:center; z-index:40; padding:18px;
  }
  .move-confirm-overlay.hidden { display:none; }
  .move-confirm-card {
    width:min(440px,100%); background:#0c1425;
    border-radius:20px; border:1px solid var(--line);
    padding:20px; box-shadow:0 24px 70px rgba(0,0,0,.45);
  }
  .move-confirm-body { margin:14px 0; font-size:14px; line-height:1.7; }
  .move-from { color:var(--muted); }
  .move-arrow { font-size:22px; text-align:center; margin:6px 0; color:#49d17d; }
  .move-to   { color:var(--text); font-weight:800; }
  .move-err-msg { margin-top:10px; padding:8px 12px; border-radius:10px; background:rgba(240,66,66,.15); border:1px solid rgba(240,66,66,.4); color:#ff8f8f; font-size:13px; }
  /* loading 狀態按鈕 */
  @keyframes btnPulse {
    0%,100% { opacity:1; }
    50%      { opacity:0.55; }
  }
  .btn-loading {
    animation: btnPulse 1s ease-in-out infinite;
    pointer-events: none;
    background: #1a3a6e !important;
    border-color: #3a6abf !important;
  }
  .btn-retry {
    background: #6e2020 !important;
    border-color: #bf4040 !important;
  }

  @media (max-width: 720px) {
    .detail-grid { grid-template-columns: 1fr; }
    .search-dual { grid-template-columns: 1fr; }
    .corner-cell, .depth-head { min-width: 58px !important; }
    .depth-head strong { font-size: 12px; }
    .depth-head small { font-size: 10px; }
    .app-shell { padding: 0; }
    .app-panel { border-radius: 0; padding: 18px 14px 24px; border-width: 0; min-height: 100vh; }
    .hero, .topbar, .overview-head { flex-direction: column; align-items: stretch; }
    .detail-header { flex-direction: row; align-items: flex-start; }
    h1 { font-size: 28px; }
    .search { width: 100%; }
    .overview-table thead th { min-width: 154px; }
    .overview-cell { min-width: 154px; }
    .corner-cell, .depth-head { min-width: 84px; }
    .detail-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      margin: 0;
      border-radius: 22px 22px 0 0;
      z-index: 20;
      max-height: 78vh;
      overflow: auto;
      box-shadow: 0 -24px 60px rgba(0, 0, 0, .45);
    }
    .detail-panel.hidden { display: none; }
    .cross-grid { grid-auto-columns: minmax(112px, 1fr); }
    .pallet-sku { font-size: 13px; } .cell-sku { font-size: 16px; }
    .form-grid { grid-template-columns: 1fr; }
  }

  /* ── 物理棧板組框線（多品號同板）──────────────────── */
  .pallet-group {
    border: 3px solid rgba(64, 220, 180, 0.75);
    border-radius: 10px;
    padding: 4px;
    margin: 4px 0;
    background: rgba(64, 220, 180, 0.06);
    box-shadow: 0 0 0 1px rgba(64, 220, 180, 0.18), inset 0 0 8px rgba(64, 220, 180, 0.04);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .pallet-group .pallet {
    margin: 0;
  }
  .pallet-group.group-moving {
    border-color: rgba(100, 190, 255, 0.85);
    background: rgba(100, 190, 255, 0.08);
    box-shadow: 0 0 0 1px rgba(100, 190, 255, 0.25), 0 0 12px rgba(100, 190, 255, 0.15);
  }
  /* 新增排 drop zone（目前不存在的排，移動後自動建立）*/
  .drop-zone.drop-zone-new {
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,200,80,.5);
    border: 1px dashed rgba(255,200,80,.25);
    border-radius: 8px;
    margin: 4px 0;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }
  .drop-zone.drop-zone-new.active,
  .drop-zone.drop-zone-new:hover {
    background: rgba(255,200,80,.12);
    color: #f7c94f;
    border-color: rgba(255,200,80,.6);
  }

  .move-bar-group-tag {
    display: inline-block;
    background: rgba(73, 209, 125, 0.18);
    color: #49d17d;
    border-radius: 6px;

<body>
  <main class="app-shell">
    <section class="app-panel">
      <header class="hero">
        <div>
          <h1>鈦傳速智慧倉儲系統 <span id="ver" class="ver-tag"></span></h1>
          <div class="cache-row">
            <span id="cacheInfo" class="cache-info loading">準備連線...</span>
            <button class="cache-refresh" onclick="forceRefresh()" title="清除快取重新讀取">🔄</button>
            <div id="undoRedoWrap" class="undo-redo-wrap" style="display:none"></div>
          </div>
          <div class="operator-row">
            <span class="operator-label">操作者</span>
            <input id="operatorInput" class="operator-input" placeholder="輸入姓名" autocomplete="off" oninput="saveOperator()" onchange="saveOperator()">
          </div>
        </div>
      </header>

      <section class="topbar">
        <div class="search-dual">
          <input id="searchSku" class="search" placeholder="搜尋編號 / SKU">
          <input id="searchBatch" class="search" placeholder="搜尋批號">
        </div>
      </section>

      <section id="searchWrap" class="search-wrap hidden">
        <div class="section-title">搜尋結果</div>
        <div id="searchResults" class="search-results"></div>
      </section>

      <section>
        <div class="section-title">區域</div>
        <div id="zoneChips" class="zone-chips"></div>
      </section>

      <section class="overview-panel">
        <div class="overview-head">
          <div class="section-title">俯視圖</div>
          <div class="zoom-controls">
            <button class="ghost-btn zoom-btn" onclick="zoomOut()">－</button>
            <button class="ghost-btn zoom-btn" onclick="zoomIn()">＋</button>
          </div>
        </div>
        <div id="overviewTableWrap" class="overview-scroll"></div>
      </section>

      <section id="detailPanel" class="detail-panel hidden">
        <button class="detail-close-x" onclick="closeDetail()" title="關閉">✕</button>
        <div class="detail-header">
          <div class="detail-header-left">
            <div id="slotTitle" class="section-title">剖面圖</div>
            <div id="slotMeta" class="section-subtitle">先從俯視圖點一個格子</div>
          </div>
          <div id="warehouseMapWrap" class="warehouse-map-wrap detail-map"></div>
        </div>
        <div id="cellItems" class="cell-items"></div>
        <div id="itemDetail" class="item-detail empty">先點一個 item 看完整資料</div>
        <div id="crossSection" class="cross-section"></div>
      </section>
    </section>
  </main>

  <div id="detailBackdrop" class="detail-backdrop hidden" onclick="closeDetail()"></div>

  <div id="editModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <div class="section-title">更新棧板資料</div>
          <div id="editMeta" class="section-subtitle">-</div>
        </div>
        <button class="ghost-btn" onclick="closeEdit()">關閉</button>
      </div>
      <div class="form-grid">
        <label class="wide">編號<input id="editSku"></label>
        <label class="wide">批號<input id="editBatch"></label>
        <div class="qty-row">
          <label class="qty-label">箱數<small id="editPzHint" class="pz-hint"></small><input id="editBoxes" type="number" inputmode="numeric" min="0" step="1"></label>
          <label class="qty-label">片數<input id="editPieces" type="number" inputmode="numeric" min="0" step="1"></label>
        </div>
        <label class="wide">狀態<select id="editStatus"><option>正常庫存</option><option>混板/散板</option><option>專案庫存</option><option>最後一板</option></select></label>
      </div>
      <div class="action-bar">
        <button class="ghost-btn" onclick="closeEdit()">取消</button>
        <button class="primary-btn" onclick="saveEdit()">更新</button>
      </div>
    </div>
  </div>

  <!-- 選格子 overlay（換列用） -->
  <div id="moveSlotOverlay" class="move-slot-overlay hidden">
    <div class="move-slot-card">
      <div class="modal-head">
        <div>
          <div class="section-title">選擇目標格子</div>
          <div id="moveSlotMeta" class="section-subtitle">-</div>
        </div>
        <button class="ghost-btn" onclick="closeMoveSlotPicker()">取消</button>
      </div>
      <div id="moveZoneRow" class="move-zone-row"></div>
      <div id="moveDepthPicker" class="move-depth-picker hidden"></div>
      <div id="moveSlotList" class="move-slot-list"></div>
    </div>
  </div>

  <!-- 移動確認 overlay -->
  <div id="moveConfirmOverlay" class="move-confirm-overlay hidden">
    <div class="move-confirm-card">
      <div class="section-title">確認移動</div>
      <div id="moveConfirmBody" class="move-confirm-body"></div>
      <div class="action-bar">
        <button class="ghost-btn" onclick="cancelMoveMode()">取消</button>
        <button class="primary-btn" id="moveConfirmBtn" onclick="executeMove()" ontouchend="event.preventDefault(); executeMove()">確認移動</button>
      </div>
    </div>
  </div>

  <script>
  const state = {
    sheets: [],
    activeSheet: "",
    activeZoneView: null,
    activeSlot: "",
    activeDepth: 0,
    activePalletKey: "",
    activeItemKey: "",
    searchRows: [],
    searchReady: false,
    editingRow: null,
    saving: false,
    zoomScale: 1.0,
    // 移動模式
    movingKey: "",
    movingRow: null,
    movingGroupId: "",
    movingGroupKeys: [],
    moveDestSheet: "",   // 目的地分頁（支援跨分頁）
    moveDestZoneView: null,
    moveDestSlot: "",
    moveDestDepth: 0,
    moveDestLevel: 1,
    movePending: null   // { destSlot, destDepth, destLevel }
  };

  const $ = id => document.getElementById(id);

  // ===== 操作者 =====
  function getOperator() {
    var el = $('operatorInput');
    return (el && el.value.trim()) || localStorage.getItem('wms_operator') || '';
  }
  function saveOperator() {
    var el = $('operatorInput');
    if (!el) return;
    var v = el.value.trim();
    localStorage.setItem('wms_operator', v);
    el.classList.toggle('warn', !v);
  }
  function initOperator() {
    var el = $('operatorInput');
    if (!el) return;
    var saved = localStorage.getItem('wms_operator') || '';
    el.value = saved;
    el.classList.toggle('warn', !saved);
  }
  // ===== /操作者 =====

  // Warehouse map config. dir: L=left, R=right, U=up, D=down
  var ZONE_LAYOUTS = {
    A: { vw:300, vh:185,
      extras:[ {x:0,y:0,w:26,h:34,fill:'#06101c',label:'WC'}, {x:258,y:0,w:18,h:140,fill:'#020709',label:'PASS',rot:true} ],
      zones:{ A:{x:26,y:0,w:232,h:34,dir:'L',max:38}, B:{x:276,y:0,w:24,h:140,dir:'U',max:10}, C:{x:0,y:34,w:26,h:106,dir:'U',max:27}, D:{x:26,y:34,w:196,h:53,dir:'L',max:27}, E:{x:26,y:87,w:196,h:53,dir:'R',max:14}, F:{x:222,y:34,w:36,h:106,dir:'U',max:28}, G:{x:0,y:155,w:276,h:30,dir:'L',max:35} }
    },
    B: { vw:300, vh:185,
      extras:[ {x:0,y:0,w:26,h:34,fill:'#06101c',label:'WC'}, {x:258,y:0,w:18,h:140,fill:'#020709',label:'PASS',rot:true} ],
      zones:{ A:{x:26,y:0,w:232,h:34,dir:'L',max:38}, B:{x:276,y:0,w:24,h:140,dir:'U',max:6}, C:{x:0,y:34,w:26,h:106,dir:'U',max:20}, D:{x:26,y:34,w:196,h:53,dir:'L',max:36}, E:{x:26,y:87,w:196,h:53,dir:'R',max:37}, F:{x:222,y:34,w:36,h:106,dir:'U',max:11}, G:{x:0,y:155,w:276,h:30,dir:'L',max:40} }
    },
    C: { vw:300, vh:200,
      extras:[ {x:164,y:0,w:22,h:200,fill:'#020709',label:'PASS',rot:true} ],
      zones:{ A:{x:0,y:0,w:26,h:200,dir:'U',max:24}, B:{x:26,y:0,w:38,h:200,dir:'D',max:38}, C:{x:64,y:0,w:34,h:200,dir:'U',max:35}, D:{x:98,y:0,w:34,h:200,dir:'D',max:35}, E:{x:132,y:0,w:32,h:200,dir:'U',max:35}, F:{x:186,y:0,w:34,h:200,dir:'U',max:35}, G:{x:220,y:0,w:40,h:200,dir:'U',max:15}, H:{x:260,y:0,w:40,h:200,dir:'D',max:15} }
    }
  };

  function getMarkerXY(zone, slotNum) {
    var n = Math.max(1, Math.min(slotNum || 1, zone.max));
    var t = zone.max <= 1 ? 0.5 : (n - 1) / (zone.max - 1);
    var x = zone.x, y = zone.y, w = zone.w, h = zone.h, dir = zone.dir;
    var pad = 6;
    if (dir === 'L') return { mx: x + w - pad - t*(w-2*pad), my: y+h/2 };
    if (dir === 'R') return { mx: x + pad + t*(w-2*pad),     my: y+h/2 };
    if (dir === 'U') return { mx: x+w/2, my: y + h - pad - t*(h-2*pad) };
    if (dir === 'D') return { mx: x+w/2, my: y + pad + t*(h-2*pad) };
    return { mx: x+w/2, my: y+h/2 };
  }

  var DIR_ARROW = { L: '←', R: '→', U: '↑', D: '↓' };

  function skuHtml(sku) {
    return esc(String(sku || '-'));
  }

  // ===== 移動模式 =====
  var _mt = { timer: null, startX: 0, startY: 0, dragging: false, ghost: null, overZone: null };

  function startMoveMode(palletKey) {
    var row = findRowByKey(palletKey);
    if (!row) return;
    state.movingKey = palletKey;
    state.movingRow = row;
    state.moveDestSheet = state.activeSheet;
    state.moveDestZoneView = state.activeZoneView;
    // 找出同一物理棧板（PalletGroupId 相同）的所有 keys
    var groupId = row.PalletGroupId || palletKey;
    state.movingGroupId = groupId;
    var groupKeys = [];
    var zv = state.activeZoneView;
    if (zv) {
      (zv.slots || []).forEach(function(s) {
        (s.pallets || []).forEach(function(p) {
          if ((p.PalletGroupId || p.PalletKey) === groupId) groupKeys.push(p.PalletKey);
        });
      });
    }
    state.movingGroupKeys = groupKeys.length > 0 ? groupKeys : [palletKey];
    state.moveDestSlot = state.activeSlot;   // 預設同格子
    state.moveDestDepth = 0;
    state.moveDestLevel = 1;
    if (navigator.vibrate) navigator.vibrate(40);
    var _sy = window.scrollY;
    var _cross = $('crossSection');
    var _sx = _cross ? _cross.scrollLeft : 0;
    state._suppressFocus = true;
    renderDetailPanel();
    window.scrollTo(0, _sy);
    var _cross2 = $('crossSection');
    if (_cross2) _cross2.scrollLeft = _sx;
    setTimeout(function() { state._suppressFocus = false; }, 200);
  }

  function cancelMoveMode() {
    if (state.saving) return; // 寫入中不允許取消
    state.movingKey = '';
    state.movingRow = null;
    state.movingGroupId = '';
    state.movingGroupKeys = [];
    state.moveDestSheet = '';
    state.moveDestZoneView = null;
    state.moveDestSlot = '';
    state.moveDestDepth = 0;
    state.movePending = null;
    _destroyGhost();
    closeMoveSlotPicker();
    closeMoveConfirm();
    renderDetailPanel();
  }

  function _destroyGhost() {
    if (_mt.ghost) { _mt.ghost.remove(); _mt.ghost = null; }
    if (_mt.overZone) { _mt.overZone.classList.remove('active'); _mt.overZone = null; }
    _mt.dragging = false;
  }

  function _createGhost(x, y) {
    _destroyGhost();
    var row = state.movingRow;
    if (!row) return;
    var g = document.createElement('div');
    g.className = 'move-ghost';
    g.innerHTML = '<div>' + skuHtml(row.SKU || '-') + '</div><div style="font-size:10px;margin-top:3px;opacity:.8">' + esc(row.Batch || '') + '</div>';
    g.style.left = (x - 55) + 'px';
    g.style.top  = (y - 40) + 'px';
    document.body.appendChild(g);
    _mt.ghost = g;
    _mt.dragging = true;
  }

  // Drop zone hit test (touch position)
  function _updateGhostPos(x, y) {
    if (_mt.ghost) { _mt.ghost.style.left = (x-55)+'px'; _mt.ghost.style.top = (y-40)+'px'; }
    _mt.ghost && (_mt.ghost.style.pointerEvents = 'none');
    var el = document.elementFromPoint(x, y);
    _mt.ghost && (_mt.ghost.style.pointerEvents = '');
    var zone = el && el.closest ? el.closest('.drop-zone') : null;
    if (zone !== _mt.overZone) {
      if (_mt.overZone) _mt.overZone.classList.remove('active');
      _mt.overZone = zone;
      if (zone) zone.classList.add('active');
    }
  }

  function _dropOnZone() {
    var zone = _mt.overZone;
    _destroyGhost();
    if (!zone) return;
    var d = Number(zone.dataset.depth);
    var l = Number(zone.dataset.level);
    openMoveConfirm(state.activeSlot, d, l);
  }

  // 選格子 overlay（支援跨分頁）
  function openMoveSlotPicker() {
    var row = state.movingRow;
    var meta = $('moveSlotMeta');
    if (meta && row) meta.textContent = (row.SKU || '-') + ' / ' + (row.Batch || '');
    if (!state.moveDestSheet) state.moveDestSheet = state.activeSheet;
    if (!state.moveDestZoneView) state.moveDestZoneView = state.activeZoneView;
    var dp = $('moveDepthPicker');
    if (dp) dp.classList.add('hidden');
    _renderMoveZoneChips();
    _renderMoveSlotList();
    $('moveSlotOverlay').classList.remove('hidden');
  }

  function _renderMoveZoneChips() {
    var zoneRow = $('moveZoneRow');
    if (!zoneRow) return;
    zoneRow.innerHTML = (state.sheets || []).map(function(s) {
      var active = s.name === state.moveDestSheet ? ' selected' : '';
      return '<button class="move-zone-chip' + active + '" onclick="selectMoveSheet(' + JSON.stringify(s.name) + ')">' + esc(s.name) + '</button>';
    }).join('');
  }

  function _renderMoveSlotList() {
    var zv = state.moveDestZoneView;
    var list = $('moveSlotList');
    if (!list) return;
    if (!zv) { list.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">載入中…</div>'; return; }
    var srcRow = state.movingRow;
    list.innerHTML = (zv.slots || []).map(function(s) {
      var isSrc = state.moveDestSheet === (srcRow && srcRow.Sheet) &&
                  s.slotId === (srcRow ? String(srcRow.Slot) : '');
      var sel = isSrc ? ' selected' : '';
      return '<button class="move-slot-chip' + sel + '" data-slotid="' + esc(s.slotId) + '" onclick="selectMoveSlot(' + JSON.stringify(s.slotId) + ')">' +
        esc(s.slotId) + '<small>' + esc(s.palletCount) + '板</small></button>';
    }).join('');
  }

  async function selectMoveSheet(sheetName) {
    state.moveDestSheet = sheetName;
    state.moveDestSlot = '';
    state.moveDestDepth = 0;
    var dp = $('moveDepthPicker');
    if (dp) dp.classList.add('hidden');
    // 更新 zone chip 高亮
    var zoneRow = $('moveZoneRow');
    if (zoneRow) zoneRow.querySelectorAll('.move-zone-chip').forEach(function(b) {
      b.classList.toggle('selected', b.textContent === sheetName);
    });
    // 從快取取，或前景載入
    var zv = cacheGet('zone_' + sheetName);
    if (!zv && sheetName === state.activeSheet) zv = state.activeZoneView;
    if (!zv) {
      var list = $('moveSlotList');
      if (list) list.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">載入 ' + esc(sheetName) + '…</div>';
      try {
        zv = await gas('getWarehouseZoneView', sheetName);
        cacheSet('zone_' + sheetName, zv);
      } catch(e) {
        if (list) list.innerHTML = '<div style="color:#ff8f8f;font-size:12px;padding:8px">載入失敗：' + esc(e.message || '') + '</div>';
        return;
      }
    }
    state.moveDestZoneView = zv;
    _renderMoveSlotList();
  }

  function closeMoveSlotPicker() {
    $('moveSlotOverlay').classList.add('hidden');
  }

  function selectMoveSlot(slotId) {
    var list = $('moveSlotList');
    if (list) list.querySelectorAll('.move-slot-chip').forEach(function(b) {
      b.classList.toggle('selected', b.dataset.slotid === slotId);
    });
    state.moveDestSlot = slotId;
    var zv = state.moveDestZoneView;
    var slot = (zv && zv.slots) ? zv.slots.find(function(s){ return s.slotId === slotId; }) : null;
    var maxD = slot ? slot.maxDepth : (zv ? zv.maxDepth : 5);
    var dp = $('moveDepthPicker');
    if (!dp) return;
    dp.innerHTML = '<span style="font-size:12px;color:var(--muted);font-weight:700;width:100%">選擇目標排：</span>' +
      Array.from({length: Math.max(maxD, 5)}, function(_, i) {
        var d = i + 1;
        return '<button class="move-depth-chip" data-depth="' + d + '" onclick="selectMoveDepth(' + d + ')">' + depthLabel(d) + '</button>';
      }).join('');
    dp.classList.remove('hidden');
  }

  function selectMoveDepth(depth) {
    var dp = $('moveDepthPicker');
    if (dp) dp.querySelectorAll('.move-depth-chip').forEach(function(b) {
      b.classList.toggle('selected', Number(b.dataset.depth) === depth);
    });
    state.moveDestDepth = depth;
    closeMoveSlotPicker();
    var zv = state.moveDestZoneView;
    var destSlotObj = zv && zv.slots ? zv.slots.find(function(s){ return s.slotId === state.moveDestSlot; }) : null;
    var existingCount = 0;
    if (destSlotObj) {
      var dd = (destSlotObj.depths || []).find(function(d){ return d.depth === depth; });
      existingCount = dd ? (dd.pallets || []).length : 0;
    }
    openMoveConfirm(state.moveDestSlot, depth, existingCount + 1);
  }

  // 確認移動 overlay
  function openMoveConfirm(destSlot, destDepth, destLevel) {
    state.movePending = { destSlot: destSlot, destDepth: destDepth, destLevel: destLevel };
    var src = state.movingRow;
    if (!src) return;
    var smSrc = (src.Sheet || '').match(/^([A-C])-([A-H])區$/);
    var srcPrefix = smSrc ? (smSrc[1] + smSrc[2]) : src.Sheet;
    var destSheetName = state.moveDestSheet || state.activeSheet;
    var smDst = (destSheetName || '').match(/^([A-C])-([A-H])區$/);
    var dstPrefix = smDst ? (smDst[1] + smDst[2]) : destSheetName;
    var fromStr = srcPrefix + '區 ' + src.Slot + '列 ' + depthLabel(src.Depth) + ' 第' + (Number(src.Level) || 1) + '層';
    var toStr   = dstPrefix + '區 ' + destSlot + '列 ' + depthLabel(destDepth) + ' 第' + destLevel + '層';
    var body = $('moveConfirmBody');
    if (body) {
      body.innerHTML =
        '<div class="move-from">來源：' + esc(fromStr) + '</div>' +
        '<div class="move-arrow">↓</div>' +
        '<div class="move-to">目標：' + esc(toStr) + '</div>';
    }
    $('moveConfirmOverlay').classList.remove('hidden');
  }

  function closeMoveConfirm() {
    $('moveConfirmOverlay').classList.add('hidden');
    state.movePending = null;
    // 重置按鈕狀態
    var btn = $('moveConfirmBtn');
    if (btn) {
      btn.disabled = false;
      btn.textContent = '確認移動';
      btn.classList.remove('btn-loading', 'btn-retry');
    }
    var errMsg = document.querySelector('.move-err-msg');
    if (errMsg) errMsg.remove();
  }

  async function executeMove() {
    if (state.saving)      { return; }
    if (!state.movePending){ return; }
    if (!state.movingRow)  { return; }
    // 防護：目標排次必須 ≥ 1，destSlot 不可空白
    if (!state.movePending.destSlot || Number(state.movePending.destDepth) < 1) {
      setStatus('⚠️ 目標位置無效（排次=' + state.movePending.destDepth + '），請重新選擇', 'err');
      closeMoveConfirm();
      return;
    }

    // ── 按鈕切換成 loading 狀態，overlay 維持開啟 ──
    var btn = $('moveConfirmBtn');
    var cancelBtn = btn && btn.parentNode && btn.parentNode.querySelector('.ghost-btn');
    if (btn) { btn.disabled = true; btn.textContent = '寫入中…'; btn.classList.add('btn-loading'); }
    if (cancelBtn) cancelBtn.disabled = true;

    var p = state.movePending;
    var src = state.movingRow;
    state.saving = true;
    try {
      var isGroupMove = state.movingGroupKeys.length > 1;
      var destSheet = state.moveDestSheet || state.activeSheet;
      var operator = getOperator();
      var result = await gas(isGroupMove ? 'movePalletGroup' : 'movePallet',
        isGroupMove ? {
          groupKeys:   state.movingGroupKeys,
          sourceSheet: src.Sheet,
          destSheet:   destSheet,
          destSlot:    p.destSlot,
          destDepth:   p.destDepth,
          destLevel:   p.destLevel,
          operator:    operator
        } : {
          palletKey:   state.movingKey,
          sourceSheet: src.Sheet,
          destSheet:   destSheet,
          destSlot:    p.destSlot,
          destDepth:   p.destDepth,
          destLevel:   p.destLevel,
          operator:    operator
        });

      // ── 成功：先清狀態再 render，只 render 一次，避免舊畫面閃現 ──
      markWriteTime_(src.Sheet);
      markWriteTime_(state.activeSheet);
      // 1. 關 overlay
      $('moveConfirmOverlay').classList.add('hidden');
      state.movePending = null;
      // 2. 重置按鈕（以備下次使用）
      if (btn) { btn.disabled = false; btn.textContent = '確認移動'; btn.classList.remove('btn-loading', 'btn-retry'); }
      // 3. 清移動模式（不呼叫 renderDetailPanel）
      state.movingKey   = '';
      state.movingRow   = null;
      state.movingGroupId   = '';
      state.movingGroupKeys = [];
      state.moveDestSlot  = '';
      state.moveDestDepth = 0;
      _destroyGhost();
      closeMoveSlotPicker();
      // 4. 更新 zone view + history，render 一次
      if (result.history) applyHistory_(result.history);
      // 快取兩邊的 zone view
      if (result.sourceZoneView) {
        cacheSet('zone_' + result.sourceZoneView.sheet, result.sourceZoneView);
      }
      if (result.destZoneView) {
        cacheSet('zone_' + result.destZoneView.sheet, result.destZoneView);
      }
      var zv = result.zoneView || result.sourceZoneView;
      if (zv) {
        cacheSet('zone_' + zv.sheet, zv);
        state.activeZoneView = zv;
      }
      // 焦點停在來源格子／排，讓使用者確認板子確實移走了
      // （不跳到目的地，使用者可自行點 undo 或用搜尋找到目的地）
      state.activeSlot  = src.Slot  ? String(src.Slot)  : state.activeSlot;
      state.activeDepth = src.Depth ? Number(src.Depth) : state.activeDepth;
      var _scrollX = window.scrollX, _scrollY = window.scrollY;
      renderOverviewTable();
      renderDetailPanel();
      window.scrollTo(_scrollX, _scrollY);
      setStatus('移動完成 ✓ → ' + (state.moveDestSheet !== src.Sheet ? esc(state.moveDestSheet) + ' ' : '') + esc(p.destSlot) + '列 ' + depthLabel(p.destDepth), 'ok');

    } catch (err) {
      // 失敗：恢復按鈕，讓使用者可以重試或取消
      if (btn) { btn.disabled = false; btn.textContent = '重試'; btn.classList.remove('btn-loading'); btn.classList.add('btn-retry'); }
      if (cancelBtn) cancelBtn.disabled = false;
      var msg = err && err.message ? err.message : String(err);
      var body = $('moveConfirmBody');
      if (body) body.insertAdjacentHTML('beforeend', '<div class="move-err-msg">⚠️ ' + esc(msg) + '</div>');
      setStatus('移動失敗：' + msg, 'err');
    } finally {
      state.saving = false;
    }
  }
  // ===== 還原 / 重做 =====
  var _history = { canUndo: false, canRedo: false, undoLabel: '', redoLabel: '' };

  function applyHistory_(h) {
    if (!h) return;
    _history = h;
    renderUndoRedo();
  }

  var _historyBusy = ''; // '', 'undo', 'redo' — 哪個按鈕正在執行中

  function _undoRedoBtnHtml_(kind, cls) {
    var u = _history;
    var isUndo = (kind === 'undo');
    var enabled = isUndo ? u.canUndo : u.canRedo;
    var label = isUndo ? '還原' : '重做';
    var count = isUndo ? (u.undoCount || 0) : (u.redoCount || 0);
    var title = isUndo ? u.undoLabel : u.redoLabel;
    var busy = (_historyBusy === kind);
    var icon = busy ? '<span class="btn-icon">↻</span> ' : '';
    var badge = (enabled && count > 0) ? '<span class="step-count">' + count + '</span>' : '';
    return '<button class="' + cls + (!enabled ? ' disabled' : '') + (busy ? ' busy' : '') +
      '" onclick="do' + (isUndo ? 'Undo' : 'Redo') + '()" title="' + esc(title) + '" ' +
      (!enabled || busy ? 'disabled' : '') + '>' + icon + label + badge + '</button>';
  }

  function renderUndoRedo() {
    var wrap = $('undoRedoWrap');
    if (!wrap) return;
    wrap.innerHTML = _undoRedoBtnHtml_('undo', 'undo-btn') + _undoRedoBtnHtml_('redo', 'redo-btn');
  }

  async function doUndo() {
    if (!_history.canUndo || state.saving) return;
    state.saving = true;
    _historyBusy = 'undo';
    renderUndoRedo();
    renderDetailPanel();
    setStatus('還原中…', '');
    try {
      var result = await gas('undoLastMove');
      applyMoveResult_(result);
      setStatus('已還原 ✓', 'ok');
    } catch (e) {
      var msg = (e.message || String(e));
      // 找不到棧板：提示使用者手動確認，而不是讓畫面卡住
      if (msg.indexOf('pallet not found') >= 0 || msg.indexOf('please refresh') >= 0) {
        setStatus('⚠️ 還原失敗：棧板已被移動，請重新整理後手動確認位置', 'err');
        // 強制重新載入目前區域，讓畫面反映最新狀態
        _bgRefreshZone(state.activeSheet, false);
      } else {
        setStatus('還原失敗：' + msg, 'err');
      }
      // 同步 history 狀態（後端已 pop 出來，要更新按鈕）
      gas('getMoveHistory').then(applyHistory_).catch(function(){});
    } finally {
      state.saving = false;
      _historyBusy = '';
      renderUndoRedo();
      renderDetailPanel();
    }
  }

  async function doRedo() {
    if (!_history.canRedo || state.saving) return;
    state.saving = true;
    _historyBusy = 'redo';
    renderUndoRedo();
    renderDetailPanel();
    setStatus('重做中…', '');
    try {
      var result = await gas('redoLastMove');
      applyMoveResult_(result);
      setStatus('已重做 ✓', 'ok');
    } catch (e) {
      var msg = (e.message || String(e));
      if (msg.indexOf('pallet not found') >= 0 || msg.indexOf('please refresh') >= 0) {
        setStatus('⚠️ 重做失敗：棧板位置已變動，請重新整理後手動確認', 'err');
        _bgRefreshZone(state.activeSheet, false);
      } else {
        setStatus('重做失敗：' + msg, 'err');
      }
      gas('getMoveHistory').then(applyHistory_).catch(function(){});
    } finally {
      state.saving = false;
      _historyBusy = '';
      renderUndoRedo();
      renderDetailPanel();
    }
  }

  // 抽出 executeMove 的成功後處理，供 undo/redo 共用
  function applyMoveResult_(result) {
    if (result && result.history) applyHistory_(result.history);
    // 標記寫入時間，防止同時進行的背景刷新覆蓋結果
    if (result && result.sourceZoneView) {
      markWriteTime_(result.sourceZoneView.sheet);
      if (result.sourceZoneView.sheet !== state.activeSheet) {
        cacheSet('zone_' + result.sourceZoneView.sheet, result.sourceZoneView);
      }
    }
    var zv = result ? (result.destZoneView || result.zoneView) : null;
    if (zv) {
      markWriteTime_(zv.sheet);
      cacheSet('zone_' + zv.sheet, zv);
      state.activeZoneView = zv;
    }
    // undo/redo 後跳回棧板所在位置
    if (result && result.navigateTo && result.navigateTo.sheet === state.activeSheet) {
      state.activeSlot  = result.navigateTo.slot;
      state.activeDepth = result.navigateTo.depth;
    }
    renderOverviewTable();
    renderDetailPanel();
  }
  // ===== /還原 / 重做 =====

  // ===== /移動模式 =====

  function renderWarehouseMap() {
    try {
      var wrap = document.getElementById('warehouseMapWrap');
      if (!wrap) return;
      var sheet = state.activeSheet || '';
      var m = sheet.match(/^([A-C])-([A-H])區$/);
      if (!m) { wrap.innerHTML = ''; return; }
      var wh = m[1], activeZone = m[2];
      var layout = ZONE_LAYOUTS[wh];
      if (!layout) { wrap.innerHTML = ''; return; }
      var slotNum = parseInt(state.activeSlot, 10) || 0;
      var vw = layout.vw, vh = layout.vh;
      var zones = layout.zones, extras = layout.extras || [];
      var p = [];
      p.push('<rect width="' + vw + '" height="' + vh + '" fill="#0d1929" rx="5"/>');
      var i, e, lx, ly, rot, zid, z, isActive, fill, stroke, sw, fs, fc, pos, tx, anc;
      for (i = 0; i < extras.length; i++) {
        e = extras[i];
        p.push('<rect x="' + e.x + '" y="' + e.y + '" width="' + e.w + '" height="' + e.h + '" rx="2" fill="#0a1520"/>');
        if (e.label) {
          lx = e.x + e.w/2; ly = e.y + e.h/2;
          rot = e.rot ? ' transform="rotate(-90 ' + lx + ' ' + ly + ')"' : '';
          p.push('<text x="' + lx + '" y="' + (ly+4) + '" text-anchor="middle" font-size="7" fill="#4a6080" font-weight="800" font-family="system-ui"' + rot + '>' + e.label + '</text>');
        }
      }
      var zoneKeys = Object.keys(zones);
      for (i = 0; i < zoneKeys.length; i++) {
        zid = zoneKeys[i]; z = zones[zid];
        isActive = zid === activeZone;
        fill   = isActive ? 'rgba(73,209,125,0.22)' : 'rgba(255,255,255,0.07)';
        stroke = isActive ? '#49d17d' : 'rgba(255,255,255,0.2)';
        sw = isActive ? 2 : 1;
        p.push('<rect x="' + z.x + '" y="' + z.y + '" width="' + z.w + '" height="' + z.h + '" rx="3" fill="' + fill + '" stroke="' + stroke + '" stroke-width="' + sw + '"/>');
        lx = z.x + z.w/2; ly = z.y + z.h/2;
        var shortSide = Math.min(z.w, z.h);
        fs = shortSide < 20 ? 7 : shortSide < 30 ? 9 : 11;
        fc = isActive ? '#6eeaa0' : '#6080a0';
        if (z.h > z.w * 2.2) {
          p.push('<text x="' + lx + '" y="' + (ly+4) + '" text-anchor="middle" font-size="' + fs + '" font-weight="900" fill="' + fc + '" font-family="system-ui" transform="rotate(-90 ' + lx + ' ' + ly + ')">' + zid + '</text>');
        } else {
          p.push('<text x="' + lx + '" y="' + (ly+4) + '" text-anchor="middle" font-size="' + fs + '" font-weight="900" fill="' + fc + '" font-family="system-ui">' + zid + '</text>');
          if (isActive && shortSide >= 24) {
            p.push('<text x="' + lx + '" y="' + (ly+13) + '" text-anchor="middle" font-size="6" font-weight="700" fill="rgba(110,234,160,0.7)" font-family="system-ui">' + (DIR_ARROW[z.dir] || '') + '</text>');
          }
        }
      }
      if (slotNum > 0 && zones[activeZone]) {
        pos = getMarkerXY(zones[activeZone], slotNum);
        p.push('<circle cx="' + pos.mx + '" cy="' + pos.my + '" r="10" fill="rgba(255,60,60,0.22)"/>');
        p.push('<circle cx="' + pos.mx + '" cy="' + pos.my + '" r="6" fill="rgba(255,60,60,0.65)"/>');
        p.push('<circle cx="' + pos.mx + '" cy="' + pos.my + '" r="3.5" fill="#ff3333"/>');
        tx = pos.mx > vw/2 ? pos.mx - 11 : pos.mx + 11;
        anc = pos.mx > vw/2 ? 'end' : 'start';
        p.push('<text x="' + tx + '" y="' + (pos.my+4) + '" text-anchor="' + anc + '" font-size="9" font-weight="900" fill="#ffaaaa" font-family="system-ui">' + slotNum + '</text>');
      }
      p.push('<text x="' + (vw-4) + '" y="' + (vh-4) + '" text-anchor="end" font-size="8" fill="#253545" font-weight="900" font-family="system-ui">' + wh + '</text>');
      wrap.innerHTML = '<svg viewBox="0 0 ' + vw + ' ' + vh + '" width="100%" style="display:block" xmlns="http://www.w3.org/2000/svg">' + p.join('') + '</svg>';
    } catch(e2) { /* fail silently, map is decorative */ }
  }
  const isMobile = () => window.matchMedia("(max-width: 720px)").matches;

  function esc(v) {
    return String(v == null ? "" : v).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
  }

  let _statusTimer = null;
  function setStatus(msg, cls) {
    const el = $("cacheInfo");
    if (!el) return;
    clearTimeout(_statusTimer);
    el.textContent = msg;
    el.className = 'cache-info ' + (cls || 'loading');
    if (cls === 'ok') {
      _statusTimer = setTimeout(() => { el.classList.add('settled'); }, 3000);
    }
  }

  function cacheTime(key) {
    try {
      const raw = localStorage.getItem('wms_' + key);
      if (!raw) return null;
      const t = JSON.parse(raw).t;
      if (!t) return null;
      const date = new Date(t);
      const hh = String(date.getHours()).padStart(2,'0');
      const mm = String(date.getMinutes()).padStart(2,'0');
      const mins = Math.round((Date.now() - t) / 60000);
      const age = mins < 2 ? '剛剛' : mins < 60 ? mins + '分前' : Math.round(mins/60) + '小時前';
      return hh + ':' + mm + ' (' + age + ')';
    } catch (e) { return null; }
  }

  function fail(err) {
    const msg = (err && (err.stack || err.message)) || String(err);
    setStatus("載入失敗：\n" + msg, "bad");
  }

  function gas(method, ...args) {
    const timeoutMs = method === 'movePalletGroup' ? 90000 : method === 'movePallet' ? 60000 : method === "updateWarehousePallet" ? 30000 : 20000;
    return new Promise(async (resolve, reject) => {
      const timer = setTimeout(() => reject(new Error(method + " timeout after " + Math.round(timeoutMs/1000) + "s")), timeoutMs);
      try {
        console.log('[api calling]', method, JSON.stringify(args[0] || ''));
        const res  = await fetch('/api/dispatch', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ method, args }) });
        clearTimeout(timer);
        const data = await res.json();
        if (!res.ok) { reject(new Error(data.error || 'Server error')); return; }
        console.log('[api OK]', method);
        resolve(data);
      } catch(e) { clearTimeout(timer); console.error('[api ERR]', method, e); reject(e); }
    });
  }

  // 數量字色 → 狀態標籤 HTML（正常不顯示）
  function qtyStatusHtml(fontColor) {
    if (fontColor === 'RED')    return '<span class="qty-status reported">已回報</span>';
    if (fontColor === 'GREEN')  return '<span class="qty-status pending">待重點</span>';
    if (fontColor === 'YELLOW') return '<span class="qty-status nosys">無庫存</span>';
    return '';
  }

  function paletteClass(row) {
    const bg = String(row.BgColor || "WHITE").toLowerCase();
    const font = String(row.FontColor || "BLACK").toLowerCase();
    return [bg === "red" ? "red" : bg === "yellow" ? "yellow" : bg === "green" ? "green" : "white", font === "blue" ? "bluefont" : ""].join(" ").trim();
  }

  function rowText(row) {
    return [row.SKU, row.Batch, row.HanhwaCode, row.Brand, row.Series, row.OriginalName, row.Sheet, row.Stack, row.Slot].join(" ").toLowerCase();
  }

  // ── 快取層 ──
  const CACHE_FRESH_MS  =  5 * 60 * 1000;   //  5 分鐘：完全不需要刷新
  const CACHE_STALE_MS  = 30 * 60 * 1000;   // 30 分鐘：背景刷新
  // 超過 30 分或無快取：前景載入

  function cacheGet(key) {
    try {
      const raw = localStorage.getItem('wms_' + key);
      if (!raw) return null;
      return JSON.parse(raw).v;
    } catch (e) { return null; }
  }
  function cacheSet(key, val) {
    var data = JSON.stringify({ t: Date.now(), v: val });
    try {
      localStorage.setItem('wms_' + key, data);
    } catch (e) {
      // QuotaExceededError：清除最舊的 zone 快取後重試
      if (e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014) {
        try {
          var entries = [];
          for (var k in localStorage) {
            if (!String(k).startsWith('wms_zone_')) continue;
            try { entries.push({ k: k, t: JSON.parse(localStorage.getItem(k)).t || 0 }); } catch(e2) {}
          }
          entries.sort(function(a, b) { return a.t - b.t; }); // 最舊排前面
          var toDel = Math.max(1, Math.ceil(entries.length / 2));
          for (var i = 0; i < toDel; i++) localStorage.removeItem(entries[i].k);
          localStorage.setItem('wms_' + key, data); // 重試
        } catch(e3) { console.warn('[cacheSet] quota retry failed:', key, e3); }
      } else {
        console.warn('[cacheSet] failed:', key, e);
      }
    }
  }
  function cacheAgeMs(key) {
    try {
      const raw = localStorage.getItem('wms_' + key);
      if (!raw) return Infinity;
      const t = JSON.parse(raw).t;
      return t ? Date.now() - t : Infinity;
    } catch(e) { return Infinity; }
  }
  function cacheAge(key) {
    try {
      const raw = localStorage.getItem('wms_' + key);
      if (!raw) return null;
      const t = JSON.parse(raw).t;
      if (!t) return null;
      const mins = Math.round((Date.now() - t) / 60000);
      return mins < 60 ? mins + ' 分前' : Math.round(mins / 60) + ' 小時前';
    } catch (e) { return null; }
  }
  function cacheClear() {
    Object.keys(localStorage).filter(k => k.startsWith('wms_')).forEach(k => localStorage.removeItem(k));
  }

  // ── 背景靜默刷新單一區域 ──
  // isSilent=true 時不更新 status bar（預熱用）
  var _bgRefreshingZones = {};
  var _lastWriteTime = {};   // sheetName → timestamp，用來偵測背景刷新是否已過時

  // 任何寫入操作（move/update）完成後呼叫，標記該 sheet 的寫入時間
  function markWriteTime_(sheetName) {
    _lastWriteTime[sheetName] = Date.now();
  }

  async function _bgRefreshZone(sheetName, isSilent) {
    if (_bgRefreshingZones[sheetName]) return;   // 避免重複
    _bgRefreshingZones[sheetName] = true;
    var startTime = Date.now();   // 記錄請求發出時刻
    try {
      if (!isSilent && state.activeSheet === sheetName) setStatus('同步中…', 'loading');
      const fresh = await gas('getWarehouseZoneView', sheetName);
      // ★ 防止 race condition：若請求發出後有過寫入，丟棄這個過時的結果
      if ((_lastWriteTime[sheetName] || 0) > startTime) {
        console.log('[bgRefresh] discarded stale result for', sheetName);
        return;
      }
      cacheSet('zone_' + sheetName, fresh);
      if (state.activeSheet === sheetName) {
        // 若使用者正在這個區域，刷新畫面（不打斷編輯/移動）
        state.activeZoneView = fresh;
        if (!state.editingRow && !state.movingKey) {
          renderOverviewTable();
          // 只在沒有彈窗時才重繪 detail，避免閃爍
          if (!$('moveConfirmOverlay') || $('moveConfirmOverlay').classList.contains('hidden')) {
            renderDetailPanel();
          }
        }
        if (!isSilent) setStatus('已同步 ' + (cacheTime('zone_' + sheetName) || ''), 'ok');
      }
      renderZoneChips();   // 刷新同步指示點
    } catch(e) {
      console.warn('[bgRefresh]', sheetName, e);
      if (!isSilent && state.activeSheet === sheetName) setStatus('背景同步失敗', 'bad');
    } finally {
      _bgRefreshingZones[sheetName] = false;
    }
  }

  // ── 預熱所有區域（啟動後背景依序載入）──
  var _preloadDone = false;
  async function _preloadAllZones() {
    if (_preloadDone) return;
    _preloadDone = true;
    const sheets = state.sheets || [];
    for (const sheet of sheets) {
      if (sheet.name === state.activeSheet) continue;    // 主區已載入
      const ageMs = cacheAgeMs('zone_' + sheet.name);
      if (ageMs < CACHE_STALE_MS) continue;              // 快取還新鮮，不需刷
      await _bgRefreshZone(sheet.name, true);            // 靜默預熱
      await new Promise(r => setTimeout(r, 600));        // 間隔 0.6s 避免打擠
    }
    console.log('[preload] all zones warmed');
  }

  async function boot() {
    try {
      initOperator();
      const d = new Date();
      const ver = 'V' + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
      if ($("ver")) $("ver").textContent = ver;

      let sheets = cacheGet('sheets');
      if (sheets) {
        state.sheets = sheets;
        setStatus("快取中…");
      } else {
        setStatus("讀取區域清單...");
        sheets = await gas("getInventorySheetList");
        state.sheets = sheets;
        cacheSet('sheets', sheets);
      }

      renderZoneChips();
      const lastZone = localStorage.getItem('wms_last_zone');
      const preferred = (lastZone && state.sheets.find(s => s.name === lastZone))
        || state.sheets.find(s => s.name === "B-G區") || state.sheets[0];
      if (!preferred) throw new Error("沒有可用分區");
      await loadZone(preferred.name);
      preloadSearchIndex();
      // 讀取還原/重做狀態（背景，失敗不影響主流程）
      gas('getMoveHistory').then(applyHistory_).catch(() => {});
      // 背景預熱其他區域（延遲 3 秒，讓主區先穩定）
      setTimeout(_preloadAllZones, 3000);
    } catch (err) {
      fail(err);
    }
  }

  async function preloadSearchIndex() {
    try {
      let rows = cacheGet('search');
      const ageMs = cacheAgeMs('search');
      if (!rows || ageMs >= CACHE_STALE_MS) {
        const raw = await gas("getSearchIndex");
        rows = JSON.parse(raw);
        if (Array.isArray(rows)) cacheSet('search', rows);
      }
      if (Array.isArray(rows)) {
        state.searchRows = rows;
        state.searchReady = true;
        renderSearch();
      }
    } catch (err) {
      console.warn("search preload failed", err);
    }
  }

  async function loadZone(sheetName, preferredSlot, preferredDepth, preferredPalletKey) {
    state.activeSheet = sheetName;
    localStorage.setItem('wms_last_zone', sheetName);
    renderZoneChips();

    const ageMs = cacheAgeMs('zone_' + sheetName);
    let zoneView = cacheGet('zone_' + sheetName);

    if (zoneView) {
      // ── 有快取：立刻顯示，按新鮮度決定是否背景刷新 ──
      state.activeZoneView = zoneView;
      state.activeSlot = preferredSlot || "";
      state.activeDepth = Number(preferredDepth || 0);
      state.activePalletKey = preferredPalletKey || "";
      state.activeItemKey = preferredPalletKey || "";
      renderOverviewTable();
      renderDetailPanel();
      renderSearch();

      if (ageMs < CACHE_FRESH_MS) {
        setStatus('快取 ' + (cacheTime('zone_' + sheetName) || ''), 'ok');
      } else {
        // 背景靜默刷新（不卡 UI）
        _bgRefreshZone(sheetName, false);
      }
      return;   // 立刻返回，畫面已顯示
    }

    // ── 無快取：前景載入 ──
    setStatus("載入 " + sheetName + "...");
    zoneView = await gas("getWarehouseZoneView", sheetName);
    cacheSet('zone_' + sheetName, zoneView);
    const t = cacheTime('zone_' + sheetName);
    setStatus("已更新 " + (t || ''), "ok");

    state.activeZoneView = zoneView;
    state.activeSlot = preferredSlot || "";
    state.activeDepth = Number(preferredDepth || 0);
    state.activePalletKey = preferredPalletKey || "";
    state.activeItemKey = preferredPalletKey || "";
    renderOverviewTable();
    renderDetailPanel();
    renderSearch();
  }

  async function forceRefresh() {
    cacheClear();
    state.sheets = [];
    state.activeZoneView = null;
    state.searchRows = [];
    state.searchReady = false;
    setStatus("清除快取，重新讀取...");
    await boot();
  }

  function renderZoneChips() {
    const zoneHits = searchZoneSet();
    const zoneCompany = searchZoneCompanyMap();
    const q = currentSearchQuery();
    const sorted = hasSearchQuery(q)
      ? [...state.sheets].sort((a, b) => (zoneHits.has(a.name) ? 0 : 1) - (zoneHits.has(b.name) ? 0 : 1))
      : state.sheets;
    $("zoneChips").innerHTML = sorted.map(sheet => {
      const active = sheet.name === state.activeSheet ? "active" : "";
      const isHit = hasSearchQuery(q) && zoneHits.has(sheet.name);
      const hit = isHit ? 'hit pulse' : '';
      const cc = isHit ? companyClass(zoneCompany[sheet.name]) : '';
      // 同步狀態指示點
      const isSyncing = !!_bgRefreshingZones[sheet.name];
      const ageMs2 = cacheAgeMs('zone_' + sheet.name);
      const hasFreshCache = ageMs2 < CACHE_STALE_MS;
      const syncDot = isSyncing
        ? '<i class="zone-sync-dot syncing" title="同步中…"></i>'
        : (!hasFreshCache ? '<i class="zone-sync-dot stale" title="快取已逾期"></i>' : '');
      return '<button class="zone-chip ' + active + ' ' + hit + ' ' + cc + '" data-sheet="' + esc(sheet.name) + '" onclick="loadZone(' + JSON.stringify(sheet.name) + '); return false;">' + esc(sheet.name) + syncDot + '<span>' + esc(sheet.count) + '</span></button>';
    }).join("");
  }

  function slotById(slotId) {
    const zoneView = state.activeZoneView || {};
    return (zoneView.slots || []).find(slot => slot.slotId === slotId) || null;
  }

  function depthDataOf(slot, depth) {
    return (slot && slot.depths || []).find(d => Number(d.depth) === Number(depth)) || null;
  }

  function sortedPallets(depthData) {
    return ((depthData && depthData.pallets) || []).slice().sort((a, b) => Number(a.Level || 0) - Number(b.Level || 0));
  }

  function currentSearchQuery() {
    return {
      sku: ($("searchSku") && $("searchSku").value || "").trim().toLowerCase(),
      batch: ($("searchBatch") && $("searchBatch").value || "").trim().toLowerCase()
    };
  }

  function hasSearchQuery(q) {
    return !!((q && q.sku) || (q && q.batch));
  }

  function rowMatchesQuery(row, q) {
    if (!q) return false;
    const skuOk = !q.sku || rowText(row).includes(q.sku);
    const batchOk = !q.batch || String(row.Batch || '').toLowerCase().includes(q.batch);
    return skuOk && batchOk;
  }

  function searchMatches() {
    const q = currentSearchQuery();
    if (!hasSearchQuery(q) || !state.searchReady) return [];
    return state.searchRows.filter(row => rowMatchesQuery(row, q));
  }

  function searchZoneSet() {
    return new Set(searchMatches().map(row => row.Sheet));
  }

  function searchSlotDepthSet() {
    return new Set(searchMatches().map(row => [row.Sheet, row.Slot, row.Depth].join('||')));
  }

  function currentDepthPallets() {
    const slot = slotById(state.activeSlot);
    const depthData = slot ? depthDataOf(slot, state.activeDepth) : null;
    return sortedPallets(depthData);
  }

  function detailValue(v) {
    if (v === null || v === undefined || v === '') return '-';
    return v;
  }

  function companyClass(company) {
    if (!company) return '';
    if (company.includes('安帝嘉')) return 'co-antiga';
    if (company.includes('喜悅納')) return 'co-xina';
    if (company.includes('高雅瓷')) return 'co-koya';
    if (company.includes('漢樺')) return 'co-hanhwa';
    return '';
  }

  function searchZoneCompanyMap() {
    const q = currentSearchQuery();
    if (!hasSearchQuery(q) || !state.searchReady) return {};
    const map = {};
    state.searchRows.filter(row => rowMatchesQuery(row, q)).forEach(row => {
      const sheet = row.Sheet;
      if (map[sheet]) return;
      const branch = (row.Branches || []).find(b => b.Company && b.Company !== '未知分公司');
      if (branch) map[sheet] = branch.Company;
    });
    return map;
  }

  function locationCode(row) {
    const area = (row.Sheet || '').replace(/-/g, '_');
    const slot = row.Slot || '-';
    const depth = row.Depth || 0;
    const level = row.Level || '-';
    return area + '_' + slot + '列_' + depth + '排_' + level + '層';
  }

  function driveThumbUrl(url) {
    if (!url) return '';
    const m = String(url).match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (!m) return '';
    return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w400';
  }

  function toggleItemSpecs() {
    const specs = $("itemSpecs");
    const btn = $("itemDetailToggle");
    if (!specs) return;
    const nowHidden = specs.classList.toggle("hidden");
    if (btn) btn.textContent = nowHidden ? "查看完整資訊 ▼" : "收起 ▲";
  }

  function zoomIn() {
    state.zoomScale = Math.min(+(state.zoomScale + 0.2).toFixed(1), 3.0);
    applyZoom();
  }
  function zoomOut() {
    state.zoomScale = Math.max(+(state.zoomScale - 0.2).toFixed(1), 0.4);
    applyZoom();
  }
  function applyZoom() {
    const table = $("overviewTableWrap") && $("overviewTableWrap").querySelector('.overview-table');
    if (table) table.style.zoom = state.zoomScale;
  }

  function scrollActiveCellIntoView() {
    const wrap = $("overviewTableWrap");
    if (!wrap) return;
    const active = wrap.querySelector('.cell-btn.active');
    if (!active) return;
    active.scrollIntoView({ block: 'center', inline: 'center', behavior: 'smooth' });
  }

  function scrollActiveItemIntoView() {
    const active = $("cellItems") ? $("cellItems").querySelector('.item-chip.active') : null;
    if (!active) return;
    active.scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });

  function focusSearchTarget() {

  // 將有序 pallets 依 PalletGroupId 分組（同色塊 = 同物理棧板）
  function buildPalletGroups_(pallets) {
    var groups = [];
    var lastGid = null;
    pallets.forEach(function(row) {
      var gid = row.PalletGroupId || row.PalletKey;
      if (gid !== lastGid) { groups.push({ groupId: gid, pallets: [] }); lastGid = gid; }
      groups[groups.length - 1].pallets.push(row);
    });
    return groups;
  }
