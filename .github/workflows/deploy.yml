name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Create service-account.json
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > service-account.json

      - name: Create .env
        run: |
          printf 'PORT=3000\nSHEET_ID=%s\nNODE_ENV=production\n' \
            '${{ secrets.SHEET_ID }}' > .env

      - name: Deploy via SSH/SCP
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 21098 -H "$SSH_HOST" >> ~/.ssh/known_hosts

          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='*.gs' \
            --exclude='*.py' \
            --exclude='appsscript.json' \
            --exclude='CURRENT_PROGRESS.md' \
            --exclude='WAREHOUSE_PALLET_RULES.md' \
            --exclude='PROGRESS_0703.md' \
            -e "ssh -i ~/.ssh/id_rsa -p 21098 -o StrictHostKeyChecking=no" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH"

      - name: Restart Node.js App
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            -p 21098 "$SSH_USER@$SSH_HOST" \
            "cd $DEPLOY_PATH && ~/.cpanel/caches/cloudlinux-alt-nodejs20/bin/npm install --omit=dev --ignore-scripts && passenger-config restart-app $DEPLOY_PATH || true"
